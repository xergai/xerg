name: Publish to npm and ClawHub

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: Package(s) to publish
        required: true
        default: cli
        type: choice
        options:
          - cli
          - schemas
          - all
      clawhub_changelog:
        description: ClawHub changelog text for the Xerg skill
        required: false
        default: ''
        type: string
      clawhub_tags:
        description: ClawHub tags for the Xerg skill
        required: true
        default: latest,audit,cli,cost,efficiency,finops,openclaw,hermes,cursor,waste
        type: string
  release:
    types:
      - published

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        run: npm install --global pnpm@10.6.2

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build schemas
        run: pnpm --filter @xerg/schemas build

      - name: Repo check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: CLI package smoke test
        run: pnpm cli:smoke

  publish-schemas:
    if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.publish_target == 'schemas' || github.event.inputs.publish_target == 'all')) || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'schemas-v')) }}
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        run: npm install --global pnpm@10.6.2

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build schemas
        run: pnpm --filter @xerg/schemas build

      - name: Verify release tag matches @xerg/schemas version
        if: ${{ github.event_name == 'release' }}
        run: |
          EXPECTED_TAG="schemas-v$(node -p "require('./packages/schemas/package.json').version")"
          if [ "${{ github.event.release.tag_name }}" != "$EXPECTED_TAG" ]; then
            echo "Release tag ${GITHUB_EVENT_NAME}:${{ github.event.release.tag_name }} does not match $EXPECTED_TAG" >&2
            exit 1
          fi

      - name: Publish @xerg/schemas
        working-directory: packages/schemas
        run: npm publish --access public

  publish-cli:
    if: ${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.publish_target == 'cli' || github.event.inputs.publish_target == 'all')) || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'cli-v')) }}
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        run: npm install --global pnpm@10.6.2

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify release tag matches @xerg/cli version
        if: ${{ github.event_name == 'release' }}
        run: |
          EXPECTED_TAG="cli-v$(node -p "require('./packages/cli/package.json').version")"
          if [ "${{ github.event.release.tag_name }}" != "$EXPECTED_TAG" ]; then
            echo "Release tag ${GITHUB_EVENT_NAME}:${{ github.event.release.tag_name }} does not match $EXPECTED_TAG" >&2
            exit 1
          fi

      - name: Prepare ClawHub publish metadata
        id: clawhub_meta
        env:
          INPUT_CHANGELOG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clawhub_changelog || github.event.release.body }}
          INPUT_TAGS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clawhub_tags || 'latest,audit,cli,cost,efficiency,finops,openclaw,hermes,cursor,waste' }}
        run: |
          VERSION="$(node -p "require('./packages/cli/package.json').version")"
          CHANGELOG="$INPUT_CHANGELOG"
          TAGS="$INPUT_TAGS"

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Aligned with @xerg/cli $VERSION."
          fi

          {
            echo "version=$VERSION"
            echo "tags=$TAGS"
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify ClawHub token is configured
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "Missing CLAWHUB_TOKEN GitHub Actions secret." >&2
            echo "Add it before publishing @xerg/cli so npm and ClawHub stay in sync." >&2
            exit 1
          fi

      - name: Install ClawHub CLI
        run: npm install --global clawhub@0.9.0

      - name: Log in to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: clawhub login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish Xerg skill to ClawHub
        env:
          XERG_SKILL_VERSION: ${{ steps.clawhub_meta.outputs.version }}
          XERG_SKILL_CHANGELOG: ${{ steps.clawhub_meta.outputs.changelog }}
          XERG_SKILL_TAGS: ${{ steps.clawhub_meta.outputs.tags }}
        run: |
          clawhub --no-input publish ./skills/xerg \
            --slug xerg \
            --name "Xerg" \
            --version "$XERG_SKILL_VERSION" \
            --changelog "$XERG_SKILL_CHANGELOG" \
            --tags "$XERG_SKILL_TAGS"

      - name: Publish @xerg/cli
        working-directory: packages/cli
        run: npm publish --access public
