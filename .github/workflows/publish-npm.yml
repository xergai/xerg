name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: Package(s) to publish
        required: true
        default: cli
        type: choice
        options:
          - cli
          - schemas
          - all

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build schemas
        run: pnpm --filter @xerg/schemas build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: CLI package smoke test
        run: pnpm cli:smoke

  publish-schemas:
    if: ${{ github.event.inputs.publish_target == 'schemas' || github.event.inputs.publish_target == 'all' }}
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build schemas
        run: pnpm --filter @xerg/schemas build

      - name: Publish @xerg/schemas
        working-directory: packages/schemas
        run: npm publish --access public

  publish-cli:
    if: ${{ github.event.inputs.publish_target == 'cli' || github.event.inputs.publish_target == 'all' }}
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish @xerg/cli
        working-directory: packages/cli
        run: npm publish --access public
