name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-matrix:
    name: ci (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install pnpm
        run: npm install --global pnpm@10.6.2

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build schemas
        run: pnpm --filter @xerg/schemas build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: CLI package dry run
        run: pnpm cli:pack

      - name: CLI package smoke test
        run: pnpm cli:smoke

  ci:
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - name: CI passed
        run: echo "All matrix CI jobs passed."
